<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <title>To-Do List</title>
    </head>

    <body>
        <h1 id="projectTitle">Home</h1>
        
        <div id="userInput">
            <form id="addProject" onsubmit="return false">
                <input id="newNameField" type="text" placeholder="Enter project name:" minlength=1 maxlength=18 required aria-required="true"></input>
                <button id="submit" type="submit">Add Project</button>
            </form>
            <button id="deleteAll">Delete Projects</button>
        </div>

        <div id="content">
            <div id="projectContainer"></div>
            <div id="taskContainer"></div>
        </div>
    </body>
</html>
