<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <title>To-Do List</title>
    </head>

    <body>
        <h1 id="projectTitle">Home</h1>
        
        <div id="userInput">
            <form id="addProject" onsubmit="return false">
                <input id="newNameField" type="text" placeholder="Enter project name:" minlength="1" maxlength="19" required aria-required="true"></input>
                <button id="submit" type="submit">Add Project</button>
            </form>

            <form id="addTask" onsubmit="return false">
                <button id="addTaskButton" type="submit">Add Task</button>
            </form>
        </div>

        <div id="content">
            <div id="projectContainer"></div>
            <div id="taskContainer"></div>
        </div>

        <button id="resetAll">Clear Data</button>

        <dialog id="taskDialog" closedby="any">
            <form method="dialog" id="taskPopup">
                <table>
                    <tr>
                        <td>
                            <input id="titleField" type="text" placeholder="New task name" minlength="1" maxlength="75" required autofoc></input>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <select id="priorityDropdown">
                                <option value="Low" selected>Low</option>
                                <option value="Medium">Medium</option>
                                <option value="High">High</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <input id="dateField" type="date" placeholder="Due date" required></input>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <input id="briefField" type="text" placeholder="Brief description" minlength="1" maxlength="50" required></input>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <input id="descriptionField" type="text" placeholder="Complete description" minlength="1" required></input>
                        </td>
                    </tr>
                    
                    <tr>
                        <td>
                            <button id="submitButton" type="submit">Save</button>
                        </td>
                    </tr>
                </table>
            </form>
        </dialog>

        <dialog id="resetDialog" closedby="any">
            <form method="dialog" id="resetPopup">
                <tr>
                    <td>
                        <p>WARNING: This will permenantely delete all your data.<br> Are you sure you want to do this?</p>
                    </td>
                </tr>
                <div id="resetButtons">
                    <tr>
                        <td>
                            <button id="cancelResetButton">Cancel</button>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            <button id="submitResetButton" type="submit">Delete My Data</button>
                        </td>
                    </tr>
                </div>
            </form>
        </dialog>
    </body>
</html>
